name: Bot Veille Tech

on:
  schedule:
    # Se lance tous les jours à 8h00 UTC (9h en France l'hiver)
    - cron: '0 8 * * *'
  workflow_dispatch: # Permet de lancer le bot manuellement pour tester

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v3

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Exécuter le bot
        run: python Botveille.py
        env:
          # Si tu utilises un Webhook Discord, on le cache ici par sécurité
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK2 }}
